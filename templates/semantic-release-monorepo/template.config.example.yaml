template: semantic-release-monorepo

branch_policy_mode: full_policy
checkout_fetch_depth_mode: 0
script_argument_mode: version_only

publishables:
  - id: app
    config_file: .releaserc.app.json
    tag_format: v${version}
    prepare_cmd: ./scripts/prepare.sh ${nextRelease.version}
    publish_cmd: ./scripts/publish.sh ${nextRelease.version}
    path_filters:
      - src/**
      - Dockerfile
    credentials:
      - GH_TOKEN
      - REGISTRY
      - REPOSITORY
      - RELEASE_DOCKERFILE

  - id: helm
    config_file: .releaserc.helm.json
    tag_format: helm-v${version}
    prepare_cmd: ./scripts/helm-prepare.sh ${nextRelease.version}
    publish_cmd: ./scripts/helm-publish.sh ${nextRelease.version}
    path_filters:
      - helm/**
    credentials:
      - GH_TOKEN
      - HELM_USERNAME
      - HELM_PASSWORD
      - HELM_REPOSITORY
      - HELM_CHART_NAME
      - HELM_CHART_DIRECTORY
